name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl, ext: "" }
          - { os: macos-latest,   target: x86_64-apple-darwin,       ext: "" }
          - { os: macos-latest,   target: aarch64-apple-darwin,      ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    ext: ".exe" }
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # musl needs its linker; statically-linked binaries are portable across
      # Linux distros (TB2 sandboxes, older base images, etc).
      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked -p ignis --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/ignis${{ matrix.ext }}"
          dir="ignis-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$dir"
          cp "$bin" "$dir/"
          cp README.md LICENSE "$dir/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$dir.zip" "$dir" >/dev/null
            echo "ASSET=$dir.zip" >> "$GITHUB_ENV"
          else
            tar czf "$dir.tar.gz" "$dir"
            echo "ASSET=$dir.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
          # A hyphenated tag (e.g. v0.38.0-rc.1) is a semver prerelease: mark it
          # so GitHub's /releases/latest keeps pointing at the last stable tag.
          # install.sh resolves `latest` via that redirect, so RC builds stay
          # opt-in (IGNIS_VERSION=<tag>) and never reach unpinned installs.
          prerelease: ${{ contains(github.ref_name, '-') }}
