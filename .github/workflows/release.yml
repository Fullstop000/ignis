name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, ext: "" }
          - { os: macos-latest,   target: x86_64-apple-darwin,      ext: "" }
          - { os: macos-latest,   target: aarch64-apple-darwin,     ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: ".exe" }
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p ignis --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/ignis${{ matrix.ext }}"
          dir="ignis-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$dir"
          cp "$bin" "$dir/"
          cp README.md LICENSE "$dir/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$dir.zip" "$dir" >/dev/null
            echo "ASSET=$dir.zip" >> "$GITHUB_ENV"
          else
            tar czf "$dir.tar.gz" "$dir"
            echo "ASSET=$dir.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
