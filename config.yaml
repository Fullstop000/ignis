# Ignis Agent Configuration
# ===========================
# Select the active provider and configure credentials below.

active_provider: "kimi"   # Options: openai | deepseek | kimi | anthropic | gemini | ollama
session_id: "default"

providers:
  openai:
    api_key: "sk-your-openai-key"
    api_url: "https://api.openai.com/v1"
    model: "gpt-4o"

  deepseek:
    api_key: "sk-your-deepseek-key"
    api_url: "https://api.deepseek.com/v1"
    model: "deepseek-reasoner"

  kimi:
    api_key: "sk-your-kimi-key"
    api_url: "https://api.kimi.com/coding/v1"
    model: "kimi-for-coding"

  anthropic:
    api_key: "your-anthropic-key"
    model: "claude-sonnet-4-20250514"

  gemini:
    api_key: "your-gemini-key"
    model: "gemini-2.5-pro"

  ollama:
    api_url: "http://localhost:11434"
    model: "llama3"
