# Ignis configuration — copy to ~/.ignis/config.toml and fill in your key.
# ======================================================================
#
# Pick a provider and drop in your API key — that's it. Each provider's
# endpoint(s), model list, context windows, and reasoning levels are built into
# ignis, so you normally only need `api_key`. `/model` switches the active model
# at runtime (saved to ~/.ignis/state.json, which ignis owns and you may edit).

# Active selection as "provider/model".
model = "minimax-token-plan/MiniMax-M2.7"
auto_resume_last_session = false

# MiniMax Token Plan — serves the same models over both an OpenAI- and an
# Anthropic-compatible endpoint. ignis auto-selects the Anthropic one (MiniMax
# recommends it); set `protocol = "openai"` to use the OpenAI endpoint instead.
[providers.minimax-token-plan]
api_key = "sk-cp-your-key"
# protocol = "openai"

# ─ Other built-in providers — uncomment one and add your key ──────────────────
#
# [providers.openai]
# api_key = "sk-your-openai-key"
#
# [providers.anthropic]
# api_key = "your-anthropic-key"
#
# [providers.deepseek]
# api_key = "sk-your-deepseek-key"
#
# [providers.gemini]
# api_key = "your-gemini-key"
#
# [providers."kimi-code"]
# api_key = "sk-your-kimi-key"
#
# [providers."moonshot-platform-cn"]
# api_key = "sk-your-moonshot-key"
#
# [providers.ollama]                 # local; no API key needed

# ─ Optional overrides ─────────────────────────────────────────────────────────
# Everything here is optional — the built-in catalog already supplies each
# provider's URL and models. Override only when you need to:
#   - api_url : point at a different endpoint (a proxy, a region).
#   - models  : add models the catalog doesn't list, or override a model's
#               `reasoning` (effort levels) / `context` (window in tokens).
#               A model entry is a bare name or an inline table.
#
# [providers.deepseek]
# api_key = "sk-your-deepseek-key"
# models  = [
#   "deepseek-v4-flash",
#   { name = "deepseek-v4-pro", reasoning = ["high", "max"], context = 128000 },
# ]

# ─ Custom OpenAI-compatible endpoint (self-hosted, vLLM, any gateway) ──────────
# The `custom` provider bakes in nothing — you supply the endpoint and models.
# [providers.custom]
# api_key = "your-key"
# api_url = "https://your-host/v1"
# models  = ["your-model"]

# Web search tool (optional). Switch backends via `provider`.
# See docs/web-search.md for details.
# [web_search]
# provider = "brave"   # supported: brave, tavily
# api_key  = "your-search-api-key"

# Context compaction (optional). Summarizes older history to free up context.
# Token counts are estimated (~4 chars/token). A partial table is fine.
# [compaction]
# auto = true                # auto-compact before a prompt when over threshold
# threshold_tokens = 120000  # estimated-token trigger for auto-compaction
# keep_recent_tokens = 16000 # recent history kept verbatim when compacting
