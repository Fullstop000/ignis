# Ignis configuration — copy to ~/.ignis/config.toml and fill in your keys.
# ========================================================================

# Active selection as "provider/model" (an optional default). `/model` switches
# it at runtime, saving the choice to ~/.ignis/state.json — this file is yours
# to edit and is never auto-written.
model = "kimi-code/kimi-for-coding"
auto_resume_last_session = false

[providers."kimi-code"]
api_key = "sk-your-kimi-key"
api_url = "https://api.kimi.com/coding/v1"
models  = ["kimi-for-coding"]

# Other providers — uncomment and configure as needed. Each provider lists the
# models it offers in `models`; the active one is the top-level `model` above.
# [providers.openai]
# api_key = "sk-your-openai-key"
# api_url = "https://api.openai.com/v1"
# models  = ["gpt-4o", "o3"]
# [providers.openai.reasoning]
# # Reasoning-effort levels differ by model, so declare them per model. The
# # picker shows the effort control only for models listed here.
# o3 = ["low", "medium", "high"]
#
# [providers.deepseek]
# api_key = "sk-your-deepseek-key"
# api_url = "https://api.deepseek.com/v1"
# models  = ["deepseek-v4-flash", "deepseek-v4-pro"]
# [providers.deepseek.reasoning]
# deepseek-v4-pro = ["high", "max"]
#
# [providers.anthropic]
# api_key = "your-anthropic-key"
# models  = ["claude-sonnet-4-20250514"]
#
# [providers.gemini]
# api_key = "your-gemini-key"
# models  = ["gemini-2.5-pro"]
#
# [providers.ollama]
# api_url = "http://localhost:11434"
# models  = ["llama3"]

# Web search tool (optional). Switch backends via `provider`.
# See docs/web-search.md for details.
# [web_search]
# provider = "brave"   # supported: brave, tavily
# api_key  = "your-search-api-key"

# Context compaction (optional). Summarizes older history to free up context.
# Token counts are estimated (~4 chars/token). A partial table is fine.
# [compaction]
# auto = true                # auto-compact before a prompt when over threshold
# threshold_tokens = 120000  # estimated-token trigger for auto-compaction
# keep_recent_tokens = 16000 # recent history kept verbatim when compacting
