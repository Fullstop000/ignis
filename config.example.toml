# Ignis configuration — copy to ~/.ignis/config.toml and fill in your key.
# ======================================================================
#
# Pick a provider and drop in your API key — that's it. Each provider's
# endpoint(s), model list, context windows, and reasoning levels are built into
# ignis, so you normally only need `api_key`. `/model` switches the active model
# at runtime (saved to ~/.ignis/state.json, which ignis owns and you may edit).

# Active selection as "provider/model".
model = "minimax-token-plan/MiniMax-M2.7"
auto_resume_last_session = false

# MiniMax Token Plan — serves the same models over both an OpenAI- and an
# Anthropic-compatible endpoint. ignis auto-selects the Anthropic one (MiniMax
# recommends it); set `protocol = "openai"` to use the OpenAI endpoint instead.
[providers.minimax-token-plan]
api_key = "sk-cp-your-key"
# protocol = "openai"

# ─ Other built-in providers — uncomment one and add your key ──────────────────
#
# [providers.openai]
# api_key = "sk-your-openai-key"
#
# [providers.anthropic]
# api_key = "your-anthropic-key"
#
# [providers.deepseek]
# api_key = "sk-your-deepseek-key"
#
#
# [providers."kimi-code"]
# api_key = "sk-your-kimi-key"
#
# [providers."moonshot-platform-cn"]
# api_key = "sk-your-moonshot-key"
#
# [providers.ollama]                 # local; no API key needed

# ─ Optional provider overrides ────────────────────────────────────────────────
# Built-in providers already know their URL, protocol(s), models, context
# windows, and reasoning levels. Keep provider blocks to `api_key` unless you
# intentionally need one of these overrides:
#
#   api_url    replaces the selected endpoint URL only. Use it for a proxy,
#              gateway, or regional endpoint.
#
#   protocol   selects one of the provider's built-in protocols when it offers
#              more than one. Today this is mainly MiniMax: "anthropic" (default)
#              or "openai".
#
#   user_agent replaces a baked User-Agent header for provider plans that require
#              one. You usually should not set this.
#
#   models     merges with the built-in model list. A bare string adds an extra
#              model. An inline table with the same name as a built-in model
#              overrides that model's `reasoning` levels and/or `context`.
#
# Example: add one proxy-only model and override metadata for one built-in model.
# [providers.deepseek]
# api_key = "sk-your-deepseek-key"
# api_url = "https://your-proxy.example/v1"
# models = [
#   "proxy-only-model",
#   { name = "deepseek-v4-pro", reasoning = ["high", "max"], context = 1000000 },
# ]

# ─ Custom OpenAI-compatible endpoint (self-hosted, vLLM, any gateway) ──────────
# The `custom` provider is different: it bakes in no endpoint or models, so both
# `api_url` and `models` are required.
# [providers.custom]
# api_key = "your-key"
# api_url = "https://your-host/v1"
# models  = ["your-model"]

# Web search tool (optional). Switch backends via `provider`.
# See docs/web-search.md for details.
# [web_search]
# provider = "brave"   # supported: brave, tavily
# api_key  = "your-search-api-key"

# Context compaction (optional). Summarizes older history to free up context.
# Token counts are estimated (~4 chars/token). A partial table is fine.
# [compaction]
# auto = true                # auto-compact before a prompt when over threshold
# threshold_tokens = 120000  # estimated-token trigger for auto-compaction
# keep_recent_tokens = 16000 # recent history kept verbatim when compacting

# Miscellaneous agent settings (optional). The env var
# `IGNIS_HISTORY_TRIM` overrides `history_trim` at runtime.
# [settings]
# history_trim = "strip-only"
#   # Outbound history-trim policy. Values:
#   #   "off"         — no trim (full history every turn)
#   #   "strip-only"  — default; drops prior-turn reasoning on text-only turns
#   #                   (cache-stable; DeepSeek- and Anthropic-safe)
#   #   "strip-wide"  — strip-only PLUS inline <think> on tool-calling turns
#   #                   (experimental; preserves DeepSeek's reasoning_content
#   #                   field on tool turns to avoid 400s)
#   #   "mask-only"   — JetBrains-style observation masking only (rolling
#   #                   5-turn window; churns provider prompt-cache prefix —
#   #                   tune at your own risk)
#   #   "both"        — strip-only + mask-only together (largest savings,
#   #                   biggest cache churn)
