[package]
name = "ignis"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures-util = "0.3"
async-trait = "0.1"
dirs = "5.0"
uuid = { version = "1.0", features = ["v4"] }
bytes = "1.0"
ignis-macros = { path = "../ignis-macros" }
serde_yaml = "0.9"
ratatui = "0.26"
crossterm = "0.27"
log = "0.4"
simplelog = "0.12"
anyhow = "1.0"

[dev-dependencies]
portable-pty = "0.8"
tempfile = "3"
